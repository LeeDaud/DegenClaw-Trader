server {
    listen 80;
    server_name degen.licheng.website;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name degen.licheng.website;

    ssl_certificate /etc/letsencrypt/live/degen.licheng.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/degen.licheng.website/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/degen.licheng.website/chain.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 前端静态文件
    root /var/www/degen.licheng.website;
    index index.html;
    try_files $uri $uri/ /index.html;

    # 反向代理后端 API
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/degen.licheng.website.access.log;
    error_log /var/log/nginx/degen.licheng.website.error.log;
}
